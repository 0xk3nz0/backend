name: Branch Protection Rules

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches:
      - dev

jobs:
  master-enforce:
    if: github.event_name == 'pull_request' && github.base_ref == 'master'
    runs-on: ubuntu-latest
    steps:
      - name: Ensure PR to master comes from dev
        run: |
          if [ "${GITHUB_HEAD_REF}" != "dev" ]; then
            echo "❌ Pull request to master must come from dev branch."
            exit 1
          fi

  dev-enforce:
    if: github.event_name == 'push' && github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    steps:
      - name: Check source branch
        run: |
          echo "SOURCE_BRANCH=${GITHUB_REF#refs/heads/}"
          # Get the last commit's branch (GitHub provides head_ref on PR, not on direct push)
          # We'll enforce: pushes must come from feature/* only
          # In a push event, we can't always detect the source branch if force push; this works for standard workflow
          if [[ "$GITHUB_REF" == "refs/heads/dev" ]]; then
            echo "Push detected on dev branch"
            # Optional: you can add more logic here if you use PRs for dev as well
          fi